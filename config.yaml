# FloodAgent 本地化部署配置文件

#
# 数据目录
data_dir: ./data
#
# 会话管理
session:
  max_active: 10          # 最大活跃会话数
  idle_timeout: 30         # 空闲超时（分钟）
  retention: 30          # 会话保留天数

# 文件清理
cleanup:
  upload_retention: 7       # 上传文件保留天数
  output_retention: 30      # 生成文件保留天数
  interval: 60             # 清理检查间隔（分钟）

# 记忆系统
memory:
  max_history: 20            # 最大对话历史轮数
  context_window: 32768      # 上下文窗口大小

# Qwen模型推理模式配置
# 设置环境变量来启用推理模式：
# QWEN_ENABLE_REASONING=true  # 启用推理模式
# QWEN_REASONING_MODEL=qwen-plus  # 推理模型（推荐 qwen-plus 或 qwen-max）
